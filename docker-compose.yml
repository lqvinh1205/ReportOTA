version: '3.8'

services:
  report-ota-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: report-ota-production
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    networks:
      - report-ota-network
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  booking-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: booking-monitor
    restart: unless-stopped
    command: ["node", "booking-monitor.js"]
    env_file:
      - .env
    networks:
      - report-ota-network
    volumes:
      - ./config:/app/config
      - ./snapshots:/app/snapshots
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

networks:
  report-ota-network:
    driver: bridge
